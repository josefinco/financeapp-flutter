name: Build APK & Send via Telegram

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Get commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: Upload APK to transfer.sh
        id: upload
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          DOWNLOAD_URL=$(curl -s --upload-file "$APK_PATH" "https://transfer.sh/moneta-${{ steps.commit.outputs.sha_short }}.apk")
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Send link via Telegram
        run: |
          TEXT=$(printf '📱 *Moneta — Novo Build*\n\n🔖 Commit: `%s`\n💬 Mensagem: %s\n👤 Autor: %s\n🌿 Branch: `main`\n🕐 Data: %s UTC\n\n⬇️ [Baixar APK (arm64)](%s)\n⚠️ _Link expira em 14 dias_' \
            "${{ steps.commit.outputs.sha_short }}" \
            "${{ steps.commit.outputs.message }}" \
            "${{ steps.commit.outputs.author }}" \
            "$(date +'%d/%m/%Y %H:%M')" \
            "${{ steps.upload.outputs.download_url }}")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$TEXT" \
            -d parse_mode="MarkdownV2"
