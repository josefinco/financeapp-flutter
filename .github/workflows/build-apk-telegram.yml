name: Build APK & Send via Telegram

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Get commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: Send APK via Telegram
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          CAPTION="📱 *Moneta — Novo Build*

          🔖 Commit: \`${{ steps.commit.outputs.sha_short }}\`
          💬 Mensagem: ${{ steps.commit.outputs.message }}
          👤 Autor: ${{ steps.commit.outputs.author }}
          🌿 Branch: \`main\`
          🕐 Data: $(date +'%d/%m/%Y %H:%M') UTC"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$APK_PATH" \
            -F caption="$CAPTION" \
            -F parse_mode="Markdown"
