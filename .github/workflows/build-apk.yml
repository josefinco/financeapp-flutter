name: Build APK & Send to Telegram

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Java 17 ───────────────────────────────────────────────────────
      # Matches jvmTarget = VERSION_17 in android/app/build.gradle.kts
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─── 3. Flutter stable ────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      # ─── 4. Cache pub packages ────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ─── 5. Cache Gradle ──────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── 6. Reduce Gradle heap for CI ─────────────────────────────────────
      # android/gradle.properties sets -Xmx8G which exceeds GitHub Actions
      # runner RAM (~7GB total). Reducing to 4G prevents OOM kills.
      - name: Reduce Gradle heap for CI
        run: |
          sed -i 's/-Xmx8G/-Xmx4G/g' android/gradle.properties
          sed -i 's/-XX:MaxMetaspaceSize=4G/-XX:MaxMetaspaceSize=2G/g' android/gradle.properties

      # ─── 7. Create .env file ──────────────────────────────────────────────
      # Uses the same placeholder values from .env.example.
      # main.dart detects these and activates demo mode — no real credentials needed.
      - name: Create .env file (demo mode)
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=https://your-project.supabase.co
          SUPABASE_ANON_KEY=your-anon-key
          API_BASE_URL=http://10.0.2.2:8000/api/v1
          EOF

      # ─── 8. Install dependencies ──────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ─── 9. Code generation ───────────────────────────────────────────────
      # Generates .freezed.dart, .g.dart (Riverpod, Retrofit, JSON serialization)
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ─── 10. Build release APK ────────────────────────────────────────────
      # Split per ABI keeps each APK well below Telegram's 50 MB limit.
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # ─── 11. Upload APK artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneta-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14

      # ─── 12. Send APK via Telegram ────────────────────────────────────────
      - name: Send APK to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          TIMESTAMP=$(date -u '+%d/%m/%Y %H:%M UTC')
          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"

          CAPTION="✅ Moneta APK Build OK

          Branch: ${{ github.ref_name }}
          Commit: ${SHORT_SHA}
          Author: ${{ github.actor }}
          Data: ${TIMESTAMP}
          Mensagem: ${COMMIT_MSG}"

          curl --fail-with-body \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=${CAPTION}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"

      # ─── 13. Failure notification ─────────────────────────────────────────
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl --fail-with-body \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ Moneta APK Build FALHOU\n\nBranch: ${{ github.ref_name }}\nCommit: ${SHORT_SHA}\nAuthor: ${{ github.actor }}\nMensagem: ${COMMIT_MSG}\n\nLogs: ${RUN_URL}\"}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
