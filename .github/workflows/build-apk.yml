name: Build APK & Send to Telegram

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Java 17 ───────────────────────────────────────────────────────
      # Matches jvmTarget = VERSION_17 in android/app/build.gradle.kts
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─── 3. Flutter stable ────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      # ─── 4. Cache pub packages ────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ─── 5. Cache Gradle ──────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── 6. Reduce Gradle heap for CI ─────────────────────────────────────
      # android/gradle.properties sets -Xmx8G which exceeds GitHub Actions
      # runner RAM (~7GB total). Reducing to 4G prevents OOM kills.
      - name: Reduce Gradle heap for CI
        run: |
          sed -i 's/-Xmx8G/-Xmx4G/g' android/gradle.properties
          sed -i 's/-XX:MaxMetaspaceSize=4G/-XX:MaxMetaspaceSize=2G/g' android/gradle.properties

      # ─── 7. Create .env file ──────────────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EOF

      # ─── 8. Install dependencies ──────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ─── 9. Code generation ───────────────────────────────────────────────
      # Generates .freezed.dart, .g.dart (Riverpod, Retrofit, JSON serialization)
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ─── 10. Build release APK ────────────────────────────────────────────
      - name: Build APK
        run: flutter build apk --release

      # ─── 11. Upload APK artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneta-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ─── 12. Create GitHub Release and send link via Telegram ────────────
      - name: Send APK link via Telegram
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          TIMESTAMP=$(date -u '+%d/%m/%Y %H:%M UTC')
          APK="build/app/outputs/flutter-apk/app-release.apk"
          TAG="apk-${SHORT_SHA}-$(date -u '+%Y%m%d%H%M%S')"

          gh release create "${TAG}" "${APK}" \
            --title "APK ${SHORT_SHA}" \
            --notes "Build automático — ${COMMIT_MSG}" \
            --prerelease \
            --repo "${{ github.repository }}"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-release.apk"

          TEXT=$(printf '✅ Moneta APK Build OK\n\nBranch: %s\nCommit: %s\nAuthor: %s\nData: %s\nMensagem: %s\n\n⬇️ Download APK: %s' \
            "${{ github.ref_name }}" "${SHORT_SHA}" "${{ github.actor }}" "${TIMESTAMP}" "${COMMIT_MSG}" "${DOWNLOAD_URL}")

          curl --fail-with-body \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":$(echo "$TEXT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"

      # ─── 13. Failure notification ─────────────────────────────────────────
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl --fail-with-body \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ Moneta APK Build FALHOU\n\nBranch: ${{ github.ref_name }}\nCommit: ${SHORT_SHA}\nAuthor: ${{ github.actor }}\nMensagem: ${COMMIT_MSG}\n\nLogs: ${RUN_URL}\"}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
