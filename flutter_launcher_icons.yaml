flutter_launcher_icons:
  # Android
  android: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21          # Android 5.0+
  adaptive_icon_background: "#388E3C"   # same green as the icon bg
  adaptive_icon_foreground: "assets/images/app_icon.png"

  # iOS
  ios: true
  image_path_ios: "assets/images/app_icon.png"
  remove_alpha_ios: true       # App Store requires no alpha channel

  # Web (opcional)
  web:
    generate: false
